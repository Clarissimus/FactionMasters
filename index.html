<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Faction Masters Season 8</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Cinzel:wght@400;600&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">

<style>
  :root {
    --gold:        #d4a843;
    --gold-light:  #f0d878;
    --gold-dim:    #a07830;
    --crimson:     #c0392b;
    --bg-deep:     #1c1a14;
    --bg-card:     #2a2620;
    --bg-card2:    #343028;
    --text:        #f0e8d0;
    --text-dim:    #b0a080;
    --bye-color:   #242018;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg-deep);
    color: var(--text);
    font-family: 'Crimson Pro', serif;
    min-height: 100vh;
    overflow-x: auto;
  }

  .page-wrap { padding: 2rem 1rem 4rem; }

  /* ── Header ── */
  header { text-align: center; margin-bottom: 3rem; }

  .crest { font-size: 2.5rem; line-height: 1; margin-bottom: 0.5rem; }

  h1 {
    font-family: 'Cinzel Decorative', cursive;
    font-size: clamp(1.2rem, 3vw, 2rem);
    color: var(--gold);
    letter-spacing: 0.05em;
    line-height: 1.2;
  }

  .not-final {
    font-family: 'Cinzel', serif;
    font-size: 1rem;
    color: var(--crimson);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-top: 0.6rem;
    font-weight: 600;
  }

  .subtitle {
    font-family: 'Crimson Pro', serif;
    font-size: 1rem;
    color: var(--text-dim);
    font-style: italic;
    margin-top: 0.3rem;
  }

  .divider {
    width: 200px; height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold-dim), transparent);
    margin: 1rem auto;
  }

  #season-label {
    font-family: 'Cinzel', serif;
    font-size: 0.75rem;
    color: var(--gold-dim);
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  #fetched-label {
    font-size: 0.75rem;
    color: var(--text-dim);
    margin-top: 0.25rem;
    font-style: italic;
  }

  /* ── Bracket ── */
  .bracket-outer {
    display: flex;
    align-items: flex-start;
    justify-content: center;
    width: 100%;
    overflow-x: auto;
  }

  .bracket-side       { display: flex; flex-direction: row; }
  .bracket-side.right { flex-direction: row-reverse; }

  .bracket-round {
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    padding: 0 6px;
  }

  .round-label {
    font-family: 'Cinzel', serif;
    font-size: 0.65rem;
    color: var(--gold);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    text-align: center;
    height: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .round-body {
    position: relative;
    flex: 1;
  }

  /* ── Match ── */
  .match {
    position: absolute;
    left: 0;
    display: flex;
    flex-direction: column;
  }

  .slot {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--bg-card);
    border: 2px solid #4a4030;
    border-radius: 4px;
    padding: 6px 10px;
    width: 164px;
    transition: border-color 0.2s, background 0.2s;
    position: relative;
    overflow: hidden;
  }

  .slot::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--gold-dim);
    opacity: 0;
    transition: opacity 0.2s;
  }

  .slot:hover                { border-color: var(--gold-dim); background: var(--bg-card2); }
  .slot:hover::before        { opacity: 1; }

  .slot.bye                  { background: var(--bye-color); border-color: #2e2a20; cursor: default; }
  .slot.bye:hover            { border-color: #2e2a20; background: var(--bye-color); }
  .slot.bye:hover::before    { opacity: 0; }

  .slot.tbd                  { opacity: 0.4; cursor: default; }
  .slot.tbd:hover            { border-color: #4a4030; background: var(--bg-card); }
  .slot.tbd:hover::before    { opacity: 0; }

  .seed {
    font-family: 'Cinzel', serif;
    font-size: 0.7rem;
    color: var(--gold);
    min-width: 18px;
    text-align: right;
    flex-shrink: 0;
    font-weight: 600;
  }

  .slot-info { display: flex; flex-direction: column; overflow: hidden; flex: 1; }

  .player-name {
    font-family: 'Cinzel', serif;
    font-size: 0.72rem;
    font-weight: 600;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    line-height: 1.3;
  }

  .faction-name {
    font-size: 0.65rem;
    color: var(--text-dim);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    line-height: 1.2;
    font-style: italic;
  }

  .slot.bye .player-name { color: var(--text-dim); font-style: italic; }
  .slot.bye .seed        { color: var(--text-dim); }

  .match-sep { height: 2px; background: #5a5040; margin: 0 2px; }

  /* ── Champion / Final column ── */
  .champion-col {
    display: flex;
    flex-direction: column;
    align-items: center;
    flex-shrink: 0;
    padding: 0 14px;
  }

  .champion-label {
    font-family: 'Cinzel', serif;
    font-size: 0.65rem;
    color: var(--gold);
    letter-spacing: 0.25em;
    text-transform: uppercase;
    height: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .final-match-wrap {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    padding-top: 33%;
  }

  /* Final match uses same .slot styling but override width to match */
  .final-match { display: flex; flex-direction: column; }

  .champion-crown-wrap { text-align: center; }
  .champion-crown      { font-size: 1.8rem; display: block; margin-bottom: 4px; }

  .champion-slot {
    background: linear-gradient(135deg, #22180a, #2e2010);
    border: 2px solid var(--gold-dim);
    border-radius: 4px;
    padding: 10px 14px;
    text-align: center;
    width: 164px;
    box-shadow: 0 0 20px rgba(201,168,76,0.15);
  }

  .champion-tbd {
    font-family: 'Cinzel', serif;
    font-size: 0.8rem;
    color: var(--gold-dim);
    letter-spacing: 0.1em;
  }

  /* ── Loading / error ── */
  #loading {
    text-align: center; padding: 4rem;
    font-family: 'Cinzel', serif;
    color: var(--gold-dim); letter-spacing: 0.2em;
  }

  #error-msg {
    display: none; text-align: center; padding: 2rem;
    color: var(--crimson); font-family: 'Cinzel', serif;
  }

  .bracket-outer {
    display: flex;
    align-items: flex-start;
    justify-content: center;
    width: 100%;
  }
</style>
</head>
<body>
<div class="page-wrap">

  <header>
    <div class="crest">⚔️</div>
    <h1>Faction Masters Season 8</h1>
    <p class="not-final">NOT FINAL RANKINGS</p>
    <p class="subtitle">This would be the bracket if the season ended today.</p>
    <div class="divider"></div>
    <p id="season-label">Loading season…</p>
    <p id="fetched-label"></p>
  </header>

  <div id="loading">Summoning the rankings…</div>
  <div id="error-msg">Could not load rankings data.</div>
  <div class="bracket-outer" id="bracket" style="display:none"></div>

</div>
<script>
// ── Constants ──────────────────────────────────────────────────────────────
const SLOT_H    = 46;               // height of one player row (px)
const SEP_H     = 2;                // separator between the two rows
const MATCH_H   = SLOT_H * 2 + SEP_H;
const LABEL_H   = 28;               // round-label row height
const N_R1      = 8;                // first-round matches per side
const MATCH_GAP = 10;               // small gap between first-round matches
const BRACKET_H = N_R1 * (MATCH_H + MATCH_GAP); // tight total height

const LEFT_SEEDS = [
  [1,32],[16,17],[8,25],[9,24],
  [4,29],[13,20],[5,28],[12,21],
];
const RIGHT_SEEDS = [
  [2,31],[15,18],[7,26],[10,23],
  [3,30],[14,19],[6,27],[11,22],
];
const ROUND_LABELS = ["First Round", "Second Round", "Quarterfinal", "Semifinal"];

// ── Slot / Match builders ──────────────────────────────────────────────────
function makeSlot(username, faction, seed, type) {
  const div = document.createElement("div");
  div.className = "slot" + (type === "bye" ? " bye" : type === "tbd" ? " tbd" : "");

  const seedEl = document.createElement("span");
  seedEl.className = "seed";
  seedEl.textContent = type === "tbd" ? "?" : (type === "bye" ? "—" : seed);

  const info = document.createElement("div");
  info.className = "slot-info";

  const nameEl = document.createElement("span");
  nameEl.className = "player-name";
  nameEl.textContent = type === "bye" ? "BYE" : (type === "tbd" ? "TBD" : username);
  if (username) nameEl.title = username;

  const factEl = document.createElement("span");
  factEl.className = "faction-name";
  factEl.textContent = type === "normal" ? faction : "";

  info.appendChild(nameEl);
  info.appendChild(factEl);
  div.appendChild(seedEl);
  div.appendChild(info);
  return div;
}

function makeSep() {
  const s = document.createElement("div");
  s.className = "match-sep";
  return s;
}

function makeNormalMatch(pA, pB) {
  const wrap = document.createElement("div");
  wrap.className = "match";
  wrap.appendChild(makeSlot(pA.username, pA.faction, pA.seed, pA.username === "BYE" ? "bye" : "normal"));
  wrap.appendChild(makeSep());
  wrap.appendChild(makeSlot(pB.username, pB.faction, pB.seed, pB.username === "BYE" ? "bye" : "normal"));
  return wrap;
}

function makeTbdMatch() {
  const wrap = document.createElement("div");
  wrap.className = "match";
  wrap.appendChild(makeSlot("", "", "?", "tbd"));
  wrap.appendChild(makeSep());
  wrap.appendChild(makeSlot("", "", "?", "tbd"));
  return wrap;
}

// ── Build one bracket side ─────────────────────────────────────────────────
// In round r (0-indexed), there are N_R1/2^r matches.
// Each match gets a vertical slot of BRACKET_H / nMatches px.
// The match is centred within that slot.
function buildSide(seedPairs, players) {
  const side = document.createElement("div");
  side.className = "bracket-side";

  for (let r = 0; r < 4; r++) {
    const nMatches = N_R1 / Math.pow(2, r);
    const slotH    = BRACKET_H / nMatches;

    const col = document.createElement("div");
    col.className = "bracket-round";

    const lbl = document.createElement("div");
    lbl.className = "round-label";
    lbl.textContent = ROUND_LABELS[r];
    col.appendChild(lbl);

    const body = document.createElement("div");
    body.className = "round-body";
    body.style.height = BRACKET_H + "px";
    body.style.width  = (164 + 12) + "px";

    for (let m = 0; m < nMatches; m++) {
      let matchEl;
      if (r === 0) {
        const [sA, sB] = seedPairs[m];
        const pA = { ...(players[sA - 1] || { username: "BYE", faction: "", elo: 0 }), seed: sA };
        const pB = { ...(players[sB - 1] || { username: "BYE", faction: "", elo: 0 }), seed: sB };
        matchEl = makeNormalMatch(pA, pB);
      } else {
        matchEl = makeTbdMatch();
      }
      const topPx = m * slotH + (slotH - MATCH_H) / 2;
      matchEl.style.top  = topPx + "px";
      matchEl.style.left = "6px";
      body.appendChild(matchEl);
    }

    col.appendChild(body);
    side.appendChild(col);
  }

  return side;
}

// ── Main ───────────────────────────────────────────────────────────────────
async function loadAndRender() {
  try {
    const resp = await fetch("rankings.json");
    if (!resp.ok) throw new Error("HTTP " + resp.status);
    const data = await resp.json();

    document.getElementById("season-label").textContent = data.season || "";
    const rawDate = data.fetched_at || "";
    // Parse "YYYY-MM-DD HH:MM UTC" and reformat to "Updated Month Day"
    const datePart = rawDate.split(" ")[0]; // "YYYY-MM-DD"
    const dateObj  = datePart ? new Date(datePart + "T00:00:00") : null;
    const formatted = dateObj
      ? "Updated " + dateObj.toLocaleDateString("en-US", { month: "long", day: "numeric" })
      : "";
    document.getElementById("fetched-label").textContent = formatted;
    document.getElementById("loading").style.display = "none";

    const players = data.top_players.map((p, i) => ({ ...p, seed: i + 1 }));

    const leftSide  = buildSide(LEFT_SEEDS,  players);
    const rightSide = buildSide(RIGHT_SEEDS, players);
    rightSide.classList.add("right");

    // Centre column: Final label + Final match + Champion box
    const champCol = document.createElement("div");
    champCol.className = "champion-col";

    const champLbl = document.createElement("div");
    champLbl.className = "champion-label";
    champLbl.textContent = "Final";
    champCol.appendChild(champLbl);

    const finalWrap = document.createElement("div");
    finalWrap.className = "final-match-wrap";
    finalWrap.style.height = BRACKET_H + "px";

    // Final match box
    // Champion box first
    const crownWrap = document.createElement("div");
    crownWrap.className = "champion-crown-wrap";
    crownWrap.innerHTML = `
      <span class="champion-crown">👑</span>
      <div class="champion-slot"><div class="champion-tbd">Champion TBD</div></div>
    `;
    finalWrap.appendChild(crownWrap);

    // Final match below
    const finalMatch = document.createElement("div");
    finalMatch.className = "final-match";
    finalMatch.appendChild(makeSlot("", "", "?", "tbd"));
    finalMatch.appendChild(makeSep());
    finalMatch.appendChild(makeSlot("", "", "?", "tbd"));
    finalWrap.appendChild(finalMatch);
    champCol.appendChild(finalWrap);

    const bracket = document.getElementById("bracket");
    bracket.appendChild(leftSide);
    bracket.appendChild(champCol);
    bracket.appendChild(rightSide);
    bracket.style.display = "flex";
    bracket.style.alignItems = "flex-start";
    // Explicitly set bracket height so the page expands to contain it
    bracket.style.height = (BRACKET_H + LABEL_H) + "px";

  } catch (err) {
    document.getElementById("loading").style.display = "none";
    const errEl = document.getElementById("error-msg");
    errEl.textContent = "Could not load rankings.json — " + err.message;
    errEl.style.display = "block";
    console.error(err);
  }
}

loadAndRender();
</script>
</body>
</html>
